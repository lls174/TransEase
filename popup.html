<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransEase 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      margin: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: #888;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .form-group input::placeholder {
      color: #aaa;
    }

    .api-hint {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
      line-height: 1.4;
    }

    .api-hint a {
      color: #667eea;
      text-decoration: none;
    }

    .api-hint a:hover {
      text-decoration: underline;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .status {
      text-align: center;
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .footer p {
      font-size: 11px;
      color: #aaa;
    }

    .usage {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .usage h3 {
      font-size: 13px;
      color: #444;
      margin-bottom: 8px;
    }

    .usage p {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TransEase</h1>
      <p>AI智能翻译助手</p>
    </div>

    <div class="form-group">
      <label for="apiKey">智谱AI API密钥</label>
      <input type="password" id="apiKey" placeholder="请输入您的API密钥">
      <div class="api-hint">
        使用智谱AI免费模型 GLM-4-Flash<br>
        <a href="https://open.bigmodel.cn/" target="_blank">点击获取API密钥</a>
      </div>
    </div>

    <div class="form-group">
      <label for="targetLang">默认翻译语言</label>
      <select id="targetLang">
        <option value="zh">中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
        <option value="ru">俄语</option>
        <option value="pt">葡萄牙语</option>
        <option value="it">意大利语</option>
        <option value="ar">阿拉伯语</option>
        <option value="th">泰语</option>
        <option value="vi">越南语</option>
      </select>
    </div>

    <button class="btn-save" id="saveBtn">保存设置</button>

    <div class="status" id="status"></div>

    <div class="usage">
      <h3>使用方法</h3>
      <p>在任意网页选中文字，即可自动弹出翻译窗口。可在翻译窗口中切换目标语言。</p>
    </div>

    <div class="footer">
      <p>Powered by 智谱AI GLM-4-Flash</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
